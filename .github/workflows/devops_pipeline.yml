name: DevOps CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  # ==========================================
  # JOB 1: LINTING - Kiểm tra code style
  # ==========================================
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
      
      - name: Check code formatting with Black
        run: |
          black --check --diff src/ || echo "Code formatting issues found (non-blocking)"
        continue-on-error: true
      
      - name: Run Flake8 linter
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --max-complexity=10 --max-line-length=120 --statistics
        continue-on-error: true

  # ==========================================
  # JOB 2: UNIT TEST - Chạy test với pytest
  # ==========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Setup test environment variables
        run: |
          echo "AWS_ACCESS_KEY_ID=testing" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=testing" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "GROQ_API_KEY=fake_key_for_testing" >> $GITHUB_ENV
      
      - name: Run pytest with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term --tb=short
      
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ==========================================
  # JOB 3: SECURITY SCAN - Quét bảo mật code
  # ==========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit
      
      - name: Scan code for security issues
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ --severity-level medium
        continue-on-error: true
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ==========================================
  # JOB 4: BUILD CHECK - Kiểm tra app khởi động
  # ==========================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify imports work
        run: |
          python -c "from src.tools import ALL_TOOLS; print(f'Loaded {len(ALL_TOOLS)} tools successfully')"
          python -c "from src.utils.analytics import calculate_infrastructure_metrics; print('Analytics module OK')"
      
      - name: Pipeline summary
        run: |
          echo "All checks passed successfully!"
          echo "- Linting: passed"
          echo "- Unit Tests: passed"
          echo "- Security Scan: passed"
          echo "- Build Verification: passed"