# File kịch bản chạy test code tự động
name: AWS Network Manager Bot CI/CD

# 1. Kích hoạt Pipeline mỗi khi bạn Push code hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Chạy trên máy ảo Ubuntu mới nhất của GitHub
    runs-on: ubuntu-latest

    # Định nghĩa các biến môi trường từ GitHub Secrets (để chạy test nếu cần)
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
    # Bước 1: Lấy mã nguồn từ Repository về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Python
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # Bước 3: Cài đặt các thư viện từ file requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Bước 4: Kiểm tra lỗi cú pháp và định dạng code (Linting)
    # Bước này cực kỳ quan trọng để đảm bảo code sạch sẽ, không có biến thừa
    - name: Lint with flake8
      run: |
        pip install flake8
        # Dừng pipeline nếu có lỗi logic (E9, F63, F7, F82)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Cảnh báo nếu code trình bày chưa đẹp (max-line-length)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Bước 5: (Nâng cao) Kiểm tra thử việc khởi tạo các Client AWS/Groq
    # Bước này giúp xác nhận các biến môi trường Secrets đã hoạt động
    - name: Smoke test
      run: |
        python -c "import boto3; import os; print('Boto3 library loaded successfully')"