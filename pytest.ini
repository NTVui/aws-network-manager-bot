# File này nói cho pytest biết tìm test ở folder tests/, file phải bắt đầu bằng test_, function test bắt đầu bằng test_. --tb=short giúp error message ngắn gọn dễ đọc.
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests